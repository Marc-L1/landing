<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="description" content="Startup landing page">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Startup</title>
    <link rel="stylesheet" href="css/style.css">
  </head>

  <body>
    <div class="banner">
      <div class="container">
        <h1>Change your life, learn to code</h1>
        <h2>Le Wagon brings tech skills to creative people.</h2>
        <a href="#apply-section" class="btn-blue">Apply now</a>
      </div>
    </div>

    <div class="container">
      <div class="cards">
        <div class="card">
          <img src="images/shanghai.jpg" alt="Le Wagon Shanghai">
          <h3>Shanghai</h3>
        </div>

        <div class="card">
          <img src="images/paris.jpg" alt="Le Wagon Paris">
          <h3>Paris</h3>
        </div>

        <div class="card">
          <img src="images/rio.jpg" alt="Le Wagon Rio">
          <h3>Rio</h3>
        </div>
      </div>
    </div>

    <div class="container" id="apply-section">
      <div class="form-section">
        <h2>Apply now</h2>
        <p>Fill out the form below to join our next batch.</p>

        <div class="typeform-wrapper">
          <div data-tf-live="01KNWKQQY4FJ9DV87HYFT3SCGC"></div>
        </div>
      </div>
    </div>

    <script src="//embed.typeform.com/next/embed.js"></script>
  </body>
</html>
